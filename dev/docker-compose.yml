services:
  mongo:
    image: mongo:7.0
    container_name: mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - 27017:27017
    expose:
      - 27017
    volumes:
      - "../data/originalData:/data/db"
      - "../data/originalData_config:/data/configdb"
      - "./init-rs0.sh:/docker-entrypoint-initdb.d/init-rs0.sh"

  mongo2:
    image: mongo:7.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - 27018:27018
    expose:
      - 27018
    volumes:
      - "../data/mongo2_data:/data/db"
      - "../data/mongo2_config:/data/configdb"

  mongo3:
    image: mongo:7.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27019"]
    ports:
      - 27019:27019
    expose:
      - 27019
    volumes:
      - "../data/mongo3_data:/data/db"
      - "../data/mongo3_config:/data/configdb"



volumes:
  originalData:
  mongo2_data:
  mongo3_data:
  originalData_config:
  mongo2_config:
  mongo3_config:

networks:
  host:
