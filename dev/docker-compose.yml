services:
  mongo:
    image: mongo:7.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - 27017:27017
    expose:
      - 27017
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 30
    volumes:
      - "./data/originalData:/data/db"
      - "./data/originalData_config:/data/configdb"
      - "./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh"
